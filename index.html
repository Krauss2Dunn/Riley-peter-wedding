<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Riley & Peter</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="gate-page">

  <section class="gate-hero">
    <video autoplay muted loop playsinline class="gate-video">
      <source src="Hero-gate.mp4" type="video/mp4">
    </video>

    <div class="gate-overlay"></div>
    <div class="gate-mist"></div>

    <div class="gate-content">
      <p class="gate-kicker">Welcome</p>
      <h1>RILEY <span class="amp">&</span> PETER</h1>
      <p class="gate-subtitle">Please enter the password to view our wedding website.</p>

      <form class="gate-form" id="password-form">
        <input
          type="password"
          id="site-password"
          class="gate-input"
          placeholder="Password"
          autocomplete="off"
        />
        <button type="submit" class="gate-button">Enter</button>
      </form>

      <p class="gate-error" id="password-error"></p>
    </div>
  </section>

 <script>
  const form = document.getElementById("password-form");
  const input = document.getElementById("site-password");
  const error = document.getElementById("password-error");

  const SITE_PASSWORD = "mulligan";

  form.addEventListener("submit", function (e) {
    e.preventDefault();

    const entered = input.value.trim().toLowerCase();

    if (entered === SITE_PASSWORD.toLowerCase()) {
      sessionStorage.setItem("weddingAccess", "granted");
      window.location.href = "home.html";
    } else {
      error.textContent = "Incorrect password. Please try again.";
    }
  });

  input.addEventListener("input", () => {
    error.textContent = "";
  });
</script>
</body>
</html>
